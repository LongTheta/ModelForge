# Minimal Prometheus configuration for scraping AegisML.
# Usage: prometheus --config.file=prometheus.yaml  (or merge this scrape_configs block into your server config).
#
# Metrics are exposed at http://<target>:8080/metrics (FastAPI + prometheus_client).
# Kubernetes: align with Service annotations in aegisml/k8s/base/service.yaml (prometheus.io/scrape, port, path).

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Static target — local dev, docker compose, or port-forward to a Pod.
  - job_name: aegisml
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets:
          - localhost:8080
        labels:
          service: aegisml
          component: inference

  # Optional: in-cluster Prometheus with kubernetes_sd_configs (uncomment and tune selectors).

# Baseline Prometheus scrape config for AegisML.
#
# Usage (local):  prometheus --config.file=observability/prometheus.yaml
# Production: merge the `scrape_configs` entries into your central Prometheus config.
#
# Application exposes OpenMetrics text at GET /metrics (prometheus_client).
# Kubernetes: Service annotations in k8s/base/service.yaml (prometheus.io/scrape, port, path)
# align with static targets or kubernetes_sd relabeling below.

global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s

scrape_configs:
  # Static targets — local dev, Docker Compose, or kubectl port-forward to a Pod IP:8080.
  - job_name: aegisml
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets:
          - localhost:8080
        labels:
          cluster: local
          service: aegisml
          component: inference

  # Optional: in-cluster Prometheus using pod discovery + standard annotations.
  # Uncomment and adjust namespaces / label selectors to match your Deployment.
  # - job_name: aegisml-kubernetes
  #   metrics_path: /metrics
  #   kubernetes_sd_configs:

# =============================================================================
# AegisML — deterministic policy configuration
# Path: aegisml/policies/policy-config.yaml
# Consumer: aegisml/scripts/policy_check.py (CI: security:policy)
# =============================================================================
version: 1

metadata:
  name: aegisml-production-baseline
  description: >
    Baseline for image pinning, secret hygiene, workload resources, health probes,
    and GitLab CI credential handling. Tune per environment; enable digest pinning
    when your pipeline promotes immutable references.

rules:
  kubernetes:
    # --- Unpinned / mutable images (supply chain & rollbacks) -----------------
    # :latest moves in the registry; replicas may run different bytes over time.
    forbid_image_latest: true

    # Require @sha256:... on every container image in full Deployments. Strongest
    # guarantee; enable after CI publishes digest-pinned references.
    require_image_digest: false

    # --- Process identity (blast radius if a container is compromised) --------
    require_non_root: true

    # --- Capacity & SLOs (scheduling, noisy-neighbor, quota planning) ---------
    require_resource_limits: true

    # --- Traffic & restart behavior (safe rollouts, failed pod replacement) --
    require_readiness_probe: true
    require_liveness_probe: true

  ci:
    # --- GitLab CI: inline credentials (enforced) ---------------------------
    # Literal passwords in YAML end up in git history and job logs; use CI/CD
    # variables (masked/protected), OIDC, or a vault integration.
    forbid_plaintext_password_in_gitlab_ci: true

    # --- Review guidance (not evaluated by policy_check.py) -----------------
    # Use in MR review and for future automated rules. Keeps policy intent in-repo.
    recommendations:
      - Prefer Kaniko or buildah over Docker-in-Docker with privileged runners unless required.
      - Scope registry and cloud credentials to protected branches / environments.
      - Avoid echoing secrets in script: blocks; use masked variables and short-lived tokens.
      - Pin third-party CI images by digest or immutable tag where feasible.

  secrets:
    # --- Pattern scans on selected paths (enforced) ---------------------------
    plaintext_secrets:
      enabled: true
      scan_under_aegisml:
        - k8s/**/*.yaml
        - k8s/**/*.yml
      scan_under_repo_root:
        - .gitlab-ci.yml
      patterns:
        - name: aws_access_key_id
          regex: "AKIA[0-9A-Z]{16}"
          severity: critical

        - name: inline_secret_assignment
          regex: "(?i)(password|apikey|api_key|secret|token)\\s*[:=]\\s*[\"'][^$%][^\"']{12,}[\"']"
          severity: high

        - name: pem_private_key_block
          regex: "-----BEGIN [A-Z ]*PRIVATE KEY-----"
          severity: critical

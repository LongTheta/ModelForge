# Dev: single replica, smaller resources, shared-cluster defaults.
# GitOps: Argo CD / Flux Application source path = this directory.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: aegisml-dev

commonLabels:
  environment: dev

commonAnnotations:
  aegisml.io/environment: dev

resources:
  - namespace.yaml
  - ../../base

replicas:
  - name: aegisml-inference
    count: 1

patches:
  - path: patch-deployment.yaml
  - path: patch-configmap.yaml

images:
  - name: registry.example.com/aegisml
    newName: registry.example.com/aegisml
    newTag: aegisml-latest

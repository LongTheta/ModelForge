# Resource profile for dev (cost / shared clusters). Env comes from patch-configmap.yaml.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegisml-inference
spec:
  template:
    spec:
      containers:
        - name: inference
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 384Mi

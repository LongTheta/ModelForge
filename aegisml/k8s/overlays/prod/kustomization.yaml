# Prod: HA replicas, higher resources; pin image tag/digest in CI/GitOps.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: aegisml-prod

commonLabels:
  environment: prod

commonAnnotations:
  aegisml.io/environment: prod

resources:
  - namespace.yaml
  - ../../base

replicas:
  - name: aegisml-inference
    count: 2

patches:
  - path: patch-deployment.yaml
  - path: patch-configmap.yaml

images:
  - name: registry.example.com/aegisml
    newName: registry.example.com/aegisml
    newTag: aegisml-stable

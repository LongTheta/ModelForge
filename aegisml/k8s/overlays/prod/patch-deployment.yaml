# Resource profile for prod (capacity; add HPA later if needed).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegisml-inference
spec:
  template:
    spec:
      containers:
        - name: inference
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1Gi

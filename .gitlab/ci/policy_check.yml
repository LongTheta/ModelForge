# policy_check — AI DevSecOps Policy Enforcement Agent (review-all).
# Inputs:
#   --pipeline  → repo-root .gitlab-ci.yml
#   --gitops    → aegisml/k8s (base + overlays + Argo examples)
# Artifacts (under artifacts/policy-check/):
#   review-result.json, policy-check-summary.md (+ agent-native files such as report.md when emitted)
# Enable: set CI/CD variable POLICY_AGENT_PACKAGE (pip spec: PyPI name, package==ver, or git URL).

.policy_check_rules:
  rules:
    - if: $POLICY_AGENT_PACKAGE

policy_check:ai-devsecops:
  extends: .policy_check_rules
  stage: policy_check
  image: python:3.12-slim-bookworm
  needs:
    - job: test:pytest
    - job: test:kustomize
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  cache:
    key:
      files:
        - aegisml/pyproject.toml
    paths:
      - .cache/pip
  before_script:
    - python -m pip install --upgrade pip
    - pip install "${POLICY_AGENT_PACKAGE}"
    - pip install -e "./aegisml[retrieval]"
  script:
    - mkdir -p "${CI_PROJECT_DIR}/artifacts/policy-check"
    - |
      python -m ai_devsecops_agent.cli review-all \
        --platform gitlab \
        --pipeline "${CI_PROJECT_DIR}/.gitlab-ci.yml" \
        --gitops "${CI_PROJECT_DIR}/aegisml/k8s" \
        --artifact-dir "${CI_PROJECT_DIR}/artifacts/policy-check" \
        --markdown-out "${CI_PROJECT_DIR}/artifacts/policy-check/policy-check-summary.md"
    - |
      if [ -f "${CI_PROJECT_DIR}/artifacts/policy-check/review-result.json" ]; then
        python "${CI_PROJECT_DIR}/aegisml/scripts/enrich_review_result.py" \
          "${CI_PROJECT_DIR}/artifacts/policy-check/review-result.json"
      fi
    - |
      echo ""
      echo "========== Human-readable summary (first ~120 lines) =========="
      if [ -f "${CI_PROJECT_DIR}/artifacts/policy-check/policy-check-summary.md" ]; then
        sed -n '1,120p' "${CI_PROJECT_DIR}/artifacts/policy-check/policy-check-summary.md"
      elif [ -f "${CI_PROJECT_DIR}/artifacts/policy-check/report.md" ]; then
        sed -n '1,120p' "${CI_PROJECT_DIR}/artifacts/policy-check/report.md"
      fi
    - |
      python << 'PY'
      import json
      import os
      import pathlib
      import sys

      base = pathlib.Path(os.environ.get("CI_PROJECT_DIR", "."))
      p = base / "artifacts/policy-check/review-result.json"
      if not p.is_file():
          print(f"ERROR: missing {p}", file=sys.stderr)
          sys.exit(1)
      data = json.loads(p.read_text(encoding="utf-8"))
      verdict = data.get("verdict", "")
      findings = data.get("findings") or []
      bad = [f for f in findings if f.get("severity") in ("high", "critical")]
      print(f"verdict={verdict!r} high_or_critical_findings={len(bad)}")
      for f in bad[:20]:
          print(f"  - [{f.get('severity')}] {f.get('title', f.get('id', '?'))}")
      if verdict == "fail" or bad:
          print("policy_check: FAIL (verdict=fail and/or high/critical findings)", file=sys.stderr)
          sys.exit(1)
      print("policy_check: PASS (no high/critical findings, verdict not fail)")
      sys.exit(0)
      PY
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - artifacts/policy-check/

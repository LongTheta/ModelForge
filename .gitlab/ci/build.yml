.build_rules:
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

build:kaniko:
  extends: .build_rules
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  needs:
    - job: lint:ruff
    - job: test:pytest
    - job: test:kustomize
  variables:
    DOCKER_CONFIG: /kaniko/.docker
  before_script:
    - mkdir -p /kaniko/.docker
    - |
      echo "{\"auths\":{\"${CI_REGISTRY}\":{\"auth\":\"$(printf "%s:%s" "${CI_REGISTRY_USER}" "${CI_REGISTRY_PASSWORD}" | base64 | tr -d '\n')\"}}}" \
        > /kaniko/.docker/config.json
  script:
    - |
      VERSION="${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}"
      TAG="${AEGISML_IMAGE_NAME}-${CI_COMMIT_SHORT_SHA}"
      DIGEST_FILE="${CI_PROJECT_DIR}/aegisml/image.digest"
      /kaniko/executor
      --context "${CI_PROJECT_DIR}/aegisml"
      --dockerfile "${CI_PROJECT_DIR}/aegisml/docker/Dockerfile"
      --build-arg "GIT_COMMIT=${CI_COMMIT_SHORT_SHA}"
      --build-arg "VERSION=${VERSION}"
      --destination "${CI_REGISTRY_IMAGE}:${TAG}"
      --destination "${CI_REGISTRY_IMAGE}:${AEGISML_IMAGE_NAME}-latest"
      --digest-file "${DIGEST_FILE}"
      --label "org.opencontainers.image.revision=${CI_COMMIT_SHA}"
      --label "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
      --label "org.opencontainers.image.version=${VERSION}"
      --label "ci.environment=${AEGISML_CI_ENVIRONMENT}"
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - aegisml/image.digest

# Workflow, stages, shared cache, and anchors used by job YAML under .gitlab/ci/.

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

stages:
  - lint
  - test
  - build
  - security
  - policy_check

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  AEGISML_DIR: "$CI_PROJECT_DIR/aegisml"
  # Image naming: ${CI_REGISTRY_IMAGE}:${AEGISML_IMAGE_NAME}-${CI_COMMIT_SHORT_SHA} (+ -latest)
  AEGISML_IMAGE_NAME: "aegisml"
  # Logical label for future environment promotion (deploy job not included yet)
  AEGISML_CI_ENVIRONMENT: "ci"
  PIP_AUDIT_STRICT: "false"
  TRIVY_FAIL_ON_SEVERITY: "false"
  TRIVY_SEVERITY: "HIGH,CRITICAL"
  TRIVY_NO_PROGRESS: "true"

cache:
  key:
    files:
      - aegisml/pyproject.toml
      - aegisml/requirements.txt
  paths:
    - .cache/pip

default:
  image: python:3.12-slim-bookworm
  interruptible: true

.python_aegisml:
  before_script:
    - cd aegisml
    - python -m pip install --upgrade pip
    - python -m pip install -e ".[dev]"

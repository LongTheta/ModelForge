# Workflow rules, stages, pip cache, and shared Python install template.

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

stages:
  - lint
  - test
  - build
  - security
  - policy_check

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  AEGISML_DIR: "$CI_PROJECT_DIR/aegisml"
  # Image tag prefix for Kaniko destinations (future: map to env promotion)
  AEGISML_IMAGE_NAME: "aegisml"
  PIP_AUDIT_STRICT: "false"
  TRIVY_FAIL_ON_SEVERITY: "false"
  TRIVY_SEVERITY: "HIGH,CRITICAL"
  TRIVY_NO_PROGRESS: "true"
  # policy_check: set POLICY_AGENT_PACKAGE in GitLab UI to enable ai-devsecops agent (pip spec).

cache:
  key:
    files:
      - aegisml/pyproject.toml
      - aegisml/requirements.txt
  paths:
    - .cache/pip

default:
  image: python:3.12-slim-bookworm
  interruptible: true

.python_aegisml:
  before_script:
    - cd aegisml
    - python -m pip install --upgrade pip
    - python -m pip install -e ".[dev]"
